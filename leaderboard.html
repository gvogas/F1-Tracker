<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaderboard – F1 Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <div id="header-container"></div>

  <main>
    <section class="card">
      <div class="lb-top">
        <div>
          <h1 id="lbTitle" style="margin:0 0 4px;">Leaderboard</h1>
          <p class="muted" style="margin:0;font-size:13px;">Session results from the OpenF1 API.</p>
        </div>

        <div class="lb-controls">
          <div class="select-wrap">
            <select class="select" id="meetingSelect"></select>
          </div>
          <div class="select-wrap">
            <select class="select" id="sessionSelect"></select>
          </div>
          <button class="btn ghost" id="refreshBtn" type="button">
            <i class="fa-solid fa-rotate"></i> Refresh
          </button>
        </div>
      </div>

      <p class="dash-msg muted" id="lbMsg" style="display:none;margin-top:10px;"></p>

      <div class="table-wrap" style="margin-top:14px">
        <table class="lb-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Driver</th>
              <th>Team</th>
              <th class="right">Gap</th>
              <th class="right">Status</th>
            </tr>
          </thead>
          <tbody id="driversBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script src="core/lib/cookies.js"></script>
  <script src="core/lib/userPrefs.js"></script>
  <script src="core/lib/utils.js"></script>
  <script src="core/ui/header.js"></script>

  <script src="core/api/openf1.api.js"></script>
  <script src="core/f1/f1.data.js"></script>
  <script src="core/f1/f1.ui.js"></script>

  <script src="features/leaderboard/leaderboard.page.js"></script>
</body>
</html>
